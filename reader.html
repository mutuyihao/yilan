<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一览阅读</title>
  <script src="shared/theme.js"></script>
  <link rel="stylesheet" href="libs/github-dark.min.css">
  <style>
    :root {
      --bg:
        radial-gradient(circle at top left, rgba(62, 192, 160, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(83, 143, 241, 0.14), transparent 26%),
        linear-gradient(180deg, #07131f 0%, #0c1826 100%);
      --panel: rgba(9, 23, 38, 0.88);
      --panel-strong: rgba(13, 30, 47, 0.94);
      --line: rgba(141, 177, 204, 0.16);
      --text: #eef7ff;
      --text-soft: #aac0d4;
      --text-muted: #7790a6;
      --accent: #3ec0a0;
      --accent-strong: #69e2c4;
      --accent-soft: rgba(62, 192, 160, 0.12);
      --shadow: 0 20px 52px rgba(2, 10, 18, 0.3);
      --radius: 22px;
      --radius-sm: 14px;
      --content-width: min(1420px, calc(100vw - 48px));
    }

    :root[data-theme='light'] {
      --bg:
        radial-gradient(circle at top left, rgba(242, 169, 92, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(90, 149, 232, 0.14), transparent 26%),
        linear-gradient(180deg, #f7efe2 0%, #eef4fb 100%);
      --panel: rgba(255, 251, 245, 0.9);
      --panel-strong: rgba(255, 253, 248, 0.96);
      --line: rgba(103, 126, 147, 0.16);
      --text: #173043;
      --text-soft: #5d7488;
      --text-muted: #7a8d9d;
      --accent: #128a74;
      --accent-strong: #0f6f5e;
      --accent-soft: rgba(18, 138, 116, 0.1);
      --shadow: 0 20px 52px rgba(127, 99, 58, 0.14);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.75 'IBM Plex Sans', 'Noto Sans SC', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      padding: 24px;
      overflow: hidden;
    }

    a {
      color: var(--accent-strong);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .reader-hero,
    .reader-content,
    .diagnostics-pre,
    .markdown-body pre {
      scrollbar-width: thin;
      scrollbar-color: rgba(101, 225, 195, 0.42) rgba(255, 255, 255, 0.04);
    }

    .reader-hero::-webkit-scrollbar,
    .reader-content::-webkit-scrollbar,
    .diagnostics-pre::-webkit-scrollbar,
    .markdown-body pre::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .reader-hero::-webkit-scrollbar-track,
    .reader-content::-webkit-scrollbar-track,
    .diagnostics-pre::-webkit-scrollbar-track,
    .markdown-body pre::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
    }

    .reader-hero::-webkit-scrollbar-thumb,
    .reader-content::-webkit-scrollbar-thumb,
    .diagnostics-pre::-webkit-scrollbar-thumb,
    .markdown-body pre::-webkit-scrollbar-thumb {
      border-radius: 999px;
      border: 2px solid transparent;
      background:
        linear-gradient(180deg, rgba(95, 160, 220, 0.75), rgba(62, 192, 160, 0.78)) padding-box,
        linear-gradient(180deg, transparent, transparent) border-box;
    }

    .reader-hero::-webkit-scrollbar-thumb:hover,
    .reader-content::-webkit-scrollbar-thumb:hover,
    .diagnostics-pre::-webkit-scrollbar-thumb:hover,
    .markdown-body pre::-webkit-scrollbar-thumb:hover {
      background:
        linear-gradient(180deg, rgba(125, 190, 242, 0.88), rgba(85, 225, 188, 0.9)) padding-box,
        linear-gradient(180deg, transparent, transparent) border-box;
    }

    :root[data-theme='light'] .reader-hero,
    :root[data-theme='light'] .reader-content,
    :root[data-theme='light'] .diagnostics-pre,
    :root[data-theme='light'] .markdown-body pre {
      scrollbar-color: rgba(18, 138, 116, 0.35) rgba(21, 47, 69, 0.06);
    }

    :root[data-theme='light'] .reader-hero::-webkit-scrollbar-track,
    :root[data-theme='light'] .reader-content::-webkit-scrollbar-track,
    :root[data-theme='light'] .diagnostics-pre::-webkit-scrollbar-track,
    :root[data-theme='light'] .markdown-body pre::-webkit-scrollbar-track {
      background: rgba(21, 47, 69, 0.06);
    }

    :root[data-theme='light'] .reader-hero::-webkit-scrollbar-thumb,
    :root[data-theme='light'] .reader-content::-webkit-scrollbar-thumb,
    :root[data-theme='light'] .diagnostics-pre::-webkit-scrollbar-thumb,
    :root[data-theme='light'] .markdown-body pre::-webkit-scrollbar-thumb {
      background:
        linear-gradient(180deg, rgba(18, 138, 116, 0.7), rgba(90, 149, 232, 0.72)) padding-box,
        linear-gradient(180deg, transparent, transparent) border-box;
    }

    :root[data-theme='light'] .reader-hero::-webkit-scrollbar-thumb:hover,
    :root[data-theme='light'] .reader-content::-webkit-scrollbar-thumb:hover,
    :root[data-theme='light'] .diagnostics-pre::-webkit-scrollbar-thumb:hover,
    :root[data-theme='light'] .markdown-body pre::-webkit-scrollbar-thumb:hover {
      background:
        linear-gradient(180deg, rgba(15, 111, 94, 0.82), rgba(67, 122, 206, 0.82)) padding-box,
        linear-gradient(180deg, transparent, transparent) border-box;
    }

    button {
      font: inherit;
    }

    .reader-shell {
      width: var(--content-width);
      height: calc(100vh - 48px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    .reader-hero,
    .reader-content,
    .reader-diagnostics,
    .reader-empty {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .reader-layout {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: clamp(300px, 27vw, 360px) minmax(0, 1fr);
      gap: 18px;
      align-items: stretch;
    }

    .reader-hero {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: auto;
      padding: 18px 18px 18px 20px;
      background: color-mix(in srgb, var(--panel) 94%, transparent);
    }

    .hero-top {
      display: grid;
      gap: 14px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .eyebrow::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), #5a95e8);
      flex-shrink: 0;
    }

    h1 {
      margin: 10px 0 0;
      font-size: clamp(22px, 2.4vw, 32px);
      line-height: 1.18;
      letter-spacing: -0.03em;
    }

    .source-link {
      display: inline-block;
      margin-top: 12px;
      color: var(--accent-strong);
      font-size: 14px;
      word-break: break-all;
    }

    .source-link.is-disabled {
      color: var(--text-muted);
      text-decoration: none;
      pointer-events: none;
    }

    .hero-actions {
      display: grid;
      gap: 10px;
    }

    .hero-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      white-space: nowrap;
    }

    .hero-btn:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--text-soft) 32%, transparent);
    }

    .hero-btn.primary {
      background: linear-gradient(135deg, rgba(62, 192, 160, 0.98), rgba(83, 143, 241, 0.92));
      color: #04111d;
      border-color: transparent;
      font-weight: 700;
    }

    .hero-btn.is-disabled {
      opacity: 0.5;
      transform: none;
      pointer-events: none;
    }

    .meta-row,
    .detail-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 1fr;
    }

    .badge,
    .detail-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.2;
    }

    .badge.accent {
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    .detail-pill strong {
      color: var(--text);
      font-weight: 700;
    }

    .detail-pill {
      justify-content: space-between;
      width: 100%;
    }

    .reader-content {
      min-height: 0;
      overflow: auto;
      padding: 34px clamp(24px, 3vw, 44px) 40px;
      background: var(--panel-strong);
    }

    .markdown-body {
      width: min(860px, 100%);
      margin: 0 auto;
      color: var(--text);
      font-size: 18px;
      line-height: 1.95;
    }

    .markdown-body > :first-child {
      margin-top: 0;
    }

    .markdown-body > :last-child {
      margin-bottom: 0;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4 {
      margin: 28px 0 14px;
      line-height: 1.28;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .markdown-body h2 {
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }

    .markdown-body p,
    .markdown-body ul,
    .markdown-body ol,
    .markdown-body blockquote,
    .markdown-body pre,
    .markdown-body table {
      margin: 0 0 16px;
    }

    .markdown-body code,
    .diagnostics-pre {
      font-family: 'IBM Plex Mono', 'Cascadia Code', monospace;
    }

    .markdown-body code {
      padding: 2px 6px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: #9fd1ff;
    }

    .markdown-body a {
      color: var(--accent-strong);
      text-decoration: none;
      border-bottom: 1px solid rgba(105, 226, 196, 0.3);
    }

    .markdown-body a:hover {
      color: var(--text);
      border-bottom-color: currentColor;
    }

    .markdown-body strong {
      color: var(--text);
    }

    .markdown-body pre {
      overflow: auto;
      padding: 16px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.22);
      border: 1px solid rgba(141, 177, 204, 0.12);
    }

    .markdown-body pre code {
      padding: 0;
      background: transparent;
      color: inherit;
    }

    .markdown-body blockquote {
      padding: 12px 16px;
      border-left: 3px solid var(--accent);
      background: var(--accent-soft);
      color: var(--text-soft);
      border-radius: 0 14px 14px 0;
    }

    .markdown-body ul li + li,
    .markdown-body ol li + li {
      margin-top: 6px;
    }

    .markdown-body hr {
      height: 1px;
      margin: 22px 0;
      border: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(141, 177, 204, 0.34) 16%, rgba(141, 177, 204, 0.34) 84%, transparent 100%);
    }

    .markdown-body img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 20px auto;
      border-radius: 18px;
      border: 1px solid var(--line);
      box-shadow: 0 14px 30px rgba(2, 10, 18, 0.16);
    }

    .markdown-body table {
      width: 100%;
      display: block;
      overflow-x: auto;
      border-collapse: collapse;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
    }

    .markdown-body th,
    .markdown-body td {
      padding: 12px 14px;
      text-align: left;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .markdown-body th {
      font-weight: 600;
      color: var(--text);
      background: rgba(95, 160, 220, 0.08);
    }

    .markdown-body th:last-child,
    .markdown-body td:last-child {
      border-right: none;
    }

    .markdown-body tr:last-child td {
      border-bottom: none;
    }

    .reader-diagnostics {
      margin-top: 16px;
      padding: 0;
      overflow: hidden;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      box-shadow: none;
    }

    .reader-diagnostics summary {
      cursor: pointer;
      padding: 12px 14px;
      color: var(--text-soft);
      list-style: none;
      font-size: 13px;
    }

    .reader-diagnostics summary::-webkit-details-marker {
      display: none;
    }

    .diagnostics-pre {
      margin: 0;
      padding: 14px;
      border-top: 1px solid rgba(141, 177, 204, 0.12);
      background: rgba(0, 0, 0, 0.22);
      color: #b7d3e7;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: auto;
      max-height: 260px;
    }

    .reader-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 44px 28px;
      text-align: center;
    }

    .reader-empty h2 {
      margin: 0;
      font-size: 24px;
    }

    .reader-empty p {
      margin: 12px auto 0;
      max-width: 520px;
      color: var(--text-soft);
    }

    .status-line {
      margin-top: 12px;
      min-height: 22px;
      color: var(--text-soft);
      font-size: 13px;
    }

    .status-line.success { color: #6fd59a; }
    .status-line.error { color: #ff7a88; }

    .hidden {
      display: none !important;
    }

    @media (max-width: 960px) {
      body {
        padding: 14px;
        overflow: auto;
      }

      .reader-shell {
        height: auto;
        width: min(100%, calc(100vw - 28px));
      }

      .reader-layout {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .reader-hero,
      .reader-content {
        overflow: visible;
      }

      .hero-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .reader-content {
        padding: 22px 18px 26px;
      }

      .markdown-body {
        font-size: 16px;
        line-height: 1.82;
      }
    }

    @media (max-width: 640px) {
      .hero-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="reader-shell">
    <div id="readerLayout" class="reader-layout hidden">
      <aside id="readerHero" class="reader-hero hidden">
        <div class="hero-top">
          <div>
            <div class="eyebrow">专注阅读</div>
            <h1 id="readerTitle">正在加载摘要...</h1>
            <a id="readerSourceLink" class="source-link" href="#" target="_blank" rel="noreferrer noopener"></a>
          </div>
          <div class="hero-actions">
            <a id="openSourceBtn" class="hero-btn primary" href="#" target="_blank" rel="noreferrer noopener">打开原文</a>
            <button id="copyBtn" class="hero-btn" type="button">复制 Markdown</button>
          </div>
        </div>
        <div id="badgeRow" class="meta-row"></div>
        <div id="detailRow" class="detail-row"></div>
        <div id="statusLine" class="status-line"></div>
        <details id="readerDiagnostics" class="reader-diagnostics hidden">
          <summary>运行诊断</summary>
          <pre id="diagnosticsPre" class="diagnostics-pre"></pre>
        </details>
      </aside>

      <main id="readerContent" class="reader-content hidden">
        <article id="summaryArticle" class="markdown-body"></article>
      </main>
    </div>

    <section id="emptyState" class="reader-empty hidden">
      <h2 id="emptyTitle">没有可读取的摘要</h2>
      <p id="emptyDetail">请回到扩展侧栏，先生成一份摘要，再从“阅读”按钮打开新标签页。</p>
    </section>
  </div>

  <script src="db.js"></script>
  <script src="libs/purify.min.js"></script>
  <script src="libs/marked.min.js"></script>
  <script src="libs/highlight.min.js"></script>
  <script src="reader.js"></script>
</body>
</html>
